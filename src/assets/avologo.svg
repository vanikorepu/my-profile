<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="512" height="512">

  <!-- Each pixel = 16x16. Canvas = 16x16 grid -->
  <!-- Pure black & white, no anti-aliasing, like a 1984 Mac icon -->

  <rect width="256" height="256" fill="#fafaf7"/>

  <!-- PIXEL = 16x16 unit. Grid coords (col, row) from top-left -->
  <!-- Col/Row are 0-indexed. x = col*16, y = row*16 -->

  <g fill="#1a1a1a">

    <!-- ═══ AVOCADO OUTER SKIN (dark) ═══ -->
    <!-- Row 0: top of avocado — narrow -->
    <rect x="96"  y="0"   width="16" height="16"/> <!-- col 6 -->
    <rect x="112" y="0"   width="16" height="16"/> <!-- col 7 -->
    <rect x="128" y="0"   width="16" height="16"/> <!-- col 8 -->
    <rect x="144" y="0"   width="16" height="16"/> <!-- col 9 -->

    <!-- Row 1 -->
    <rect x="80"  y="16"  width="16" height="16"/>
    <rect x="96"  y="16"  width="16" height="16"/>
    <rect x="112" y="16"  width="16" height="16"/>
    <rect x="128" y="16"  width="16" height="16"/>
    <rect x="144" y="16"  width="16" height="16"/>
    <rect x="160" y="16"  width="16" height="16"/>

    <!-- Row 2 -->
    <rect x="64"  y="32"  width="16" height="16"/>
    <rect x="80"  y="32"  width="16" height="16"/>
    <!-- inner flesh gap 96-144 -->
    <rect x="160" y="32"  width="16" height="16"/>
    <rect x="176" y="32"  width="16" height="16"/>

    <!-- Row 3 -->
    <rect x="48"  y="48"  width="16" height="16"/>
    <rect x="64"  y="48"  width="16" height="16"/>
    <!-- gap -->
    <rect x="176" y="48"  width="16" height="16"/>
    <rect x="192" y="48"  width="16" height="16"/>

    <!-- Row 4 -->
    <rect x="32"  y="64"  width="16" height="16"/>
    <rect x="48"  y="64"  width="16" height="16"/>
    <!-- gap -->
    <rect x="192" y="64"  width="16" height="16"/>
    <rect x="208" y="64"  width="16" height="16"/>

    <!-- Row 5 -->
    <rect x="16"  y="80"  width="16" height="16"/>
    <rect x="32"  y="80"  width="16" height="16"/>
    <!-- gap -->
    <rect x="208" y="80"  width="16" height="16"/>
    <rect x="224" y="80"  width="16" height="16"/>

    <!-- Row 6 -->
    <rect x="16"  y="96"  width="16" height="16"/>
    <rect x="32"  y="96"  width="16" height="16"/>
    <!-- gap -->
    <rect x="208" y="96"  width="16" height="16"/>
    <rect x="224" y="96"  width="16" height="16"/>

    <!-- Row 7 -->
    <rect x="16"  y="112" width="16" height="16"/>
    <rect x="32"  y="112" width="16" height="16"/>
    <!-- gap -->
    <rect x="208" y="112" width="16" height="16"/>
    <rect x="224" y="112" width="16" height="16"/>

    <!-- Row 8 -->
    <rect x="16"  y="128" width="16" height="16"/>
    <rect x="32"  y="128" width="16" height="16"/>
    <!-- gap -->
    <rect x="208" y="128" width="16" height="16"/>
    <rect x="224" y="128" width="16" height="16"/>

    <!-- Row 9 — start narrowing for bottom -->
    <rect x="32"  y="144" width="16" height="16"/>
    <rect x="48"  y="144" width="16" height="16"/>
    <!-- gap -->
    <rect x="192" y="144" width="16" height="16"/>
    <rect x="208" y="144" width="16" height="16"/>

    <!-- Row 10 -->
    <rect x="48"  y="160" width="16" height="16"/>
    <rect x="64"  y="160" width="16" height="16"/>
    <!-- gap -->
    <rect x="176" y="160" width="16" height="16"/>
    <rect x="192" y="160" width="16" height="16"/>

    <!-- Row 11 -->
    <rect x="64"  y="176" width="16" height="16"/>
    <rect x="80"  y="176" width="16" height="16"/>
    <!-- gap -->
    <rect x="160" y="176" width="16" height="16"/>
    <rect x="176" y="176" width="16" height="16"/>

    <!-- Row 12 — flat bottom -->
    <rect x="80"  y="192" width="16" height="16"/>
    <rect x="96"  y="192" width="16" height="16"/>
    <rect x="112" y="192" width="16" height="16"/>
    <rect x="128" y="192" width="16" height="16"/>
    <rect x="144" y="192" width="16" height="16"/>
    <rect x="160" y="192" width="16" height="16"/>

    <!-- ═══ INNER FLESH (light) — just the outline ring ═══ -->
    <!-- Row 2 inner border -->
    <rect x="96"  y="32"  width="16" height="16"/>
    <rect x="112" y="32"  width="16" height="16"/>
    <rect x="128" y="32"  width="16" height="16"/>
    <rect x="144" y="32"  width="16" height="16"/>

    <!-- Row 3 inner -->
    <rect x="80"  y="48"  width="16" height="16"/>
    <rect x="160" y="48"  width="16" height="16"/>

    <!-- Row 4 inner -->
    <rect x="64"  y="64"  width="16" height="16"/>
    <rect x="176" y="64"  width="16" height="16"/>

    <!-- Row 5 inner -->
    <rect x="48"  y="80"  width="16" height="16"/>
    <rect x="192" y="80"  width="16" height="16"/>

    <!-- Row 6 inner -->
    <rect x="48"  y="96"  width="16" height="16"/>
    <rect x="192" y="96"  width="16" height="16"/>

    <!-- Row 7 inner -->
    <rect x="48"  y="112" width="16" height="16"/>
    <rect x="192" y="112" width="16" height="16"/>

    <!-- Row 8 inner -->
    <rect x="48"  y="128" width="16" height="16"/>
    <rect x="192" y="128" width="16" height="16"/>

    <!-- Row 9 inner -->
    <rect x="64"  y="144" width="16" height="16"/>
    <rect x="176" y="144" width="16" height="16"/>

    <!-- Row 10 inner -->
    <rect x="80"  y="160" width="16" height="16"/>
    <rect x="160" y="160" width="16" height="16"/>

    <!-- Row 11 inner bottom -->
    <rect x="96"  y="176" width="16" height="16"/>
    <rect x="112" y="176" width="16" height="16"/>
    <rect x="128" y="176" width="16" height="16"/>
    <rect x="144" y="176" width="16" height="16"/>

    <!-- ═══ PIT — solid filled circle, centered low ═══ -->
    <!-- Pit rows 6-10, cols 5-10 (centered at col 7-8, row 8) -->
    <!-- Row 6 pit top -->
    <rect x="96"  y="96"  width="16" height="16"/>
    <rect x="112" y="96"  width="16" height="16"/>
    <rect x="128" y="96"  width="16" height="16"/>
    <rect x="144" y="96"  width="16" height="16"/>

    <!-- Row 7 pit -->
    <rect x="80"  y="112" width="16" height="16"/>
    <rect x="96"  y="112" width="16" height="16"/>
    <rect x="112" y="112" width="16" height="16"/>
    <rect x="128" y="112" width="16" height="16"/>
    <rect x="144" y="112" width="16" height="16"/>
    <rect x="160" y="112" width="16" height="16"/>

    <!-- Row 8 pit — widest -->
    <rect x="80"  y="128" width="16" height="16"/>
    <rect x="96"  y="128" width="16" height="16"/>
    <rect x="112" y="128" width="16" height="16"/>
    <rect x="128" y="128" width="16" height="16"/>
    <rect x="144" y="128" width="16" height="16"/>
    <rect x="160" y="128" width="16" height="16"/>

    <!-- Row 9 pit -->
    <rect x="96"  y="144" width="16" height="16"/>
    <rect x="112" y="144" width="16" height="16"/>
    <rect x="128" y="144" width="16" height="16"/>
    <rect x="144" y="144" width="16" height="16"/>

    <!-- Pit highlight — white pixels top-left of pit -->

    <!-- ═══ BITE TAKEN — top-right corner missing ═══ -->
    <!-- We REMOVE pixels from top-right to show a bite -->
    <!-- Bite chunk: rows 0-2, cols 9-11 — erase with background color -->
    <rect x="144" y="0"   width="16" height="16" fill="#fafaf7"/> <!-- was skin -->
    <rect x="128" y="0"   width="16" height="16" fill="#fafaf7"/>
    <rect x="160" y="16"  width="16" height="16" fill="#fafaf7"/>
    <rect x="144" y="16"  width="16" height="16" fill="#fafaf7"/>
    <rect x="128" y="16"  width="16" height="16" fill="#fafaf7"/>
    <rect x="176" y="32"  width="16" height="16" fill="#fafaf7"/>
    <rect x="160" y="32"  width="16" height="16" fill="#fafaf7"/>

    <!-- Jagged bite edge — add pixels to show ragged bite line -->
    <rect x="128" y="0"   width="16" height="16" fill="#fafaf7"/>
    <rect x="144" y="16"  width="16" height="16" fill="#1a1a1a"/> <!-- bite edge pixel -->
    <rect x="160" y="32"  width="16" height="16" fill="#1a1a1a"/> <!-- bite edge -->

    <!-- ═══ STEM ═══ -->
    <rect x="112" y="0"   width="16" height="16" fill="#fafaf7"/> <!-- clear center top -->
    <rect x="120" y="0"   width="8"  height="16" fill="#1a1a1a"/> <!-- thin stem -->

    <!-- ═══ PIT HIGHLIGHT (white pixels) ═══ -->
    <rect x="96"  y="112" width="16" height="16" fill="#fafaf7"/>
    <rect x="112" y="112" width="16" height="16" fill="#fafaf7"/>

  </g>

  <!-- Subtle pixel grid -->
  <g stroke="#e0e0db" stroke-width="0.4" opacity="0.5">
    <line x1="16"  y1="0" x2="16"  y2="256"/> <line x1="32"  y1="0" x2="32"  y2="256"/>
    <line x1="48"  y1="0" x2="48"  y2="256"/> <line x1="64"  y1="0" x2="64"  y2="256"/>
    <line x1="80"  y1="0" x2="80"  y2="256"/> <line x1="96"  y1="0" x2="96"  y2="256"/>
    <line x1="112" y1="0" x2="112" y2="256"/> <line x1="128" y1="0" x2="128" y2="256"/>
    <line x1="144" y1="0" x2="144" y2="256"/> <line x1="160" y1="0" x2="160" y2="256"/>
    <line x1="176" y1="0" x2="176" y2="256"/> <line x1="192" y1="0" x2="192" y2="256"/>
    <line x1="208" y1="0" x2="208" y2="256"/> <line x1="224" y1="0" x2="224" y2="256"/>
    <line x1="240" y1="0" x2="240" y2="256"/>
    <line x1="0" y1="16"  x2="256" y2="16"/>  <line x1="0" y1="32"  x2="256" y2="32"/>
    <line x1="0" y1="48"  x2="256" y2="48"/>  <line x1="0" y1="64"  x2="256" y2="64"/>
    <line x1="0" y1="80"  x2="256" y2="80"/>  <line x1="0" y1="96"  x2="256" y2="96"/>
    <line x1="0" y1="112" x2="256" y2="112"/> <line x1="0" y1="128" x2="256" y2="128"/>
    <line x1="0" y1="144" x2="256" y2="144"/> <line x1="0" y1="160" x2="256" y2="160"/>
    <line x1="0" y1="176" x2="256" y2="176"/> <line x1="0" y1="192" x2="256" y2="192"/>
    <line x1="0" y1="208" x2="256" y2="208"/> <line x1="0" y1="224" x2="256" y2="224"/>
    <line x1="0" y1="240" x2="256" y2="240"/>
  </g>

</svg>
