<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">

  <!-- Lavender box -->
  <rect x="0" y="0" width="200" height="200" rx="36" fill="#EBBFFF"/>

  <g fill="#1a1a1a">

    <!-- STEAM wisps -->
    <rect x="70"  y="20" width="8" height="8"/>
    <rect x="78"  y="28" width="8" height="8"/>
    <rect x="70"  y="36" width="8" height="8"/>
    <rect x="62"  y="44" width="8" height="8"/>

    <rect x="96"  y="16" width="8" height="8"/>
    <rect x="104" y="24" width="8" height="8"/>
    <rect x="96"  y="32" width="8" height="8"/>
    <rect x="88"  y="40" width="8" height="8"/>

    <rect x="120" y="20" width="8" height="8"/>
    <rect x="112" y="28" width="8" height="8"/>
    <rect x="120" y="36" width="8" height="8"/>
    <rect x="128" y="44" width="8" height="8"/>

    <!-- CUP body -->
    <rect x="50"  y="60"  width="100" height="10"/>
    <rect x="50"  y="70"  width="10"  height="70"/>
    <rect x="140" y="70"  width="10"  height="70"/>
    <rect x="60"  y="130" width="80"  height="10"/>
    <rect x="70"  y="140" width="60"  height="10"/>

    <!-- CUP inner -->
    <rect x="60"  y="70"  width="80" height="60" fill="#EBBFFF"/>

    <!-- COFFEE liquid -->
    <rect x="62"  y="72"  width="76" height="20" fill="#1a1a1a"/>
    <!-- Reflection -->
    <rect x="70"  y="74"  width="20" height="4"  fill="#EBBFFF" opacity="0.6"/>

    <!-- HANDLE -->
    <rect x="150" y="80"  width="10" height="8"/>
    <rect x="158" y="88"  width="10" height="8"/>
    <rect x="158" y="96"  width="10" height="8"/>
    <rect x="158" y="104" width="10" height="8"/>
    <rect x="150" y="112" width="10" height="8"/>

    <!-- SAUCER -->
    <rect x="40"  y="150" width="120" height="8"/>
    <rect x="50"  y="158" width="100" height="6"/>
    <rect x="60"  y="164" width="80"  height="6"/>

    <!-- POWER BUTTON on cup -->
    <rect x="92"  y="86"  width="16" height="16" fill="#EBBFFF"/>
    <rect x="96"  y="88"  width="8"  height="4"  fill="#1a1a1a"/>
    <rect x="92"  y="90"  width="4"  height="8"  fill="#1a1a1a"/>
    <rect x="104" y="90"  width="4"  height="8"  fill="#1a1a1a"/>
    <rect x="96"  y="96"  width="8"  height="4"  fill="#1a1a1a"/>

  </g>

</svg>
